name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Patch lucide_icons for Flutter 3.27+ compatibility
        run: |
          FILE="$HOME/.pub-cache/hosted/pub.dev/lucide_icons-0.257.0/lib/src/icon_data.dart"
          cat > "$FILE" << 'EOF'
          import 'package:flutter/widgets.dart';

          // ignore: non_constant_identifier_names
          IconData LucideIconData(int codePoint) => IconData(
                codePoint,
                fontFamily: 'Lucide',
                fontPackage: 'lucide_icons',
              );
          EOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LexAni-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
