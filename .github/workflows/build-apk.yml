name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Patch lucide_icons for Flutter 3.27+ compatibility
        run: |
          ICONS_FILE="$HOME/.pub-cache/hosted/pub.dev/lucide_icons-0.257.0/lib/lucide_icons.dart"
          sed -i "s/const LucideIconData(\(0x[0-9a-fA-F]*\))/const IconData(\1, fontFamily: 'Lucide', fontPackage: 'lucide_icons')/g" "$ICONS_FILE"
          echo "Patch applied. Remaining LucideIconData refs: $(grep -c 'LucideIconData' $ICONS_FILE || echo 0)"

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LexAni-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
